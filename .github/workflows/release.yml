name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Version, publish, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Install dependencies
        run: bun install

      - name: Get next version
        id: next
        run: |
          VERSION=$(git cliff --bumped-version 2>/dev/null || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if a release is needed
        id: check
        run: |
          LATEST=$(git tag --sort=-version:refname | head -n1 | sed 's/^v//')
          NEXT="${{ steps.next.outputs.version }}"
          if [ -n "$NEXT" ] && [ "$LATEST" != "$NEXT" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Typecheck
        if: steps.check.outputs.needed == 'true'
        run: bun run typecheck
        working-directory: packages/cli

      - name: Build
        if: steps.check.outputs.needed == 'true'
        run: bun run build
        working-directory: packages/cli

      - name: Set version
        if: steps.check.outputs.needed == 'true'
        run: |
          jq ".version = \"${{ steps.next.outputs.version }}\"" packages/cli/package.json > tmp.json
          mv tmp.json packages/cli/package.json

      - name: Publish to npm
        if: steps.check.outputs.needed == 'true'
        run: bun publish --access public
        working-directory: packages/cli
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        if: steps.check.outputs.needed == 'true'
        id: changelog
        run: |
          BODY=$(git cliff --unreleased --bump)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        if: steps.check.outputs.needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next.outputs.version }}
          name: v${{ steps.next.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
